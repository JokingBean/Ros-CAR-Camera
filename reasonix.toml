default_model = "deepseek/deepseek-v4-flash"
[permissions]
allow = ["Bash(python -c \"\nimport paramiko\nssh=paramiko.SSHClient()\nssh.set_missing_host_key_policy(paramiko.AutoAddPolicy())\nssh.connect('100.126.101.5',username='pi',password='alcht0',timeout=8)\n\n# Check devices + OpenCV camera detection\nstdin,stdout,stderr=ssh.exec_command('python3 -c \\\"\nimport cv2,time\nfor i in range(5):\n    cap=cv2.VideoCapture(i,cv2.CAP_V4L2)\n    if cap.isOpened():\n        cap.set(cv2.CAP_PROP_FOURCC,cv2.VideoWriter_fourcc(*chr(77)+chr(74)+chr(80)+chr(71)))\n        cap.set(cv2.CAP_PROP_FRAME_WIDTH,640)\n        cap.set(cv2.CAP_PROP_FRAME_HEIGHT,480)\n        time.sleep(0.3)\n        [cap.read() for _ in range(5)]\n        ret,frame=cap.read()\n        cap.release()\n        if ret: print(f\\\"idx={i}: OK {frame.shape[1]}x{frame.shape[0]} mean={frame.mean():.0f}\\\")\n        else: print(f\\\"idx={i}: opened but no frame\\\")\n    else: print(f\\\"idx={i}: cannot open\\\")\n\\\" 2>/dev/null',timeout=15)\nprint(stdout.read().decode())\nssh.close()\n\")"]


[[providers]]
name        = "deepseek-flash"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-flash"
