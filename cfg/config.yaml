# ============================================================
# Tag 尺寸（单位：米）
# ============================================================
floor_tag_size: 0.09
target_tag_size: 0.134

# ============================================================
# 标定配置
# ============================================================
calibration:
  min_floor_tags: 8
  max_repro_error: 10.0

# ============================================================
# 运行配置
# ============================================================
runtime:
  target_fps: 20
  extrinsics_file: "cfg/extrinsics.yaml"
