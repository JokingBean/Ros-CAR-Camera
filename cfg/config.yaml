# ============================================================
# ROS-Camera 多相机 BEV — 配置文件（树莓派设备号）
# ============================================================

cameras:
  # usb1 — USB 相机 #1 (Pi /dev/video4)
  - name: usb1
    type: usb
    host: pi
    device: "4"
    resolution: [2560, 1440]
    fps: 30
    camera_matrix:
      fx: 1910.5073229751
      fy: 1916.2511727341
      cx: 1297.0145072511
      cy: 712.3008264513
    dist_coeffs: [0.0573061774, -0.0279709437, 0.0007802271, 0.0013702957, -0.0968427791]

  # usb2 — USB 相机 #2 (Pi /dev/video0)
  - name: usb2
    type: usb
    host: pi
    device: "0"
    resolution: [2560, 1440]
    fps: 30
    camera_matrix:
      fx: 1906.2183300075
      fy: 1909.0226986526
      cx: 1247.9775624111
      cy: 760.3730235874
    dist_coeffs: [0.0851789961, -0.1569904879, 0.0012179932, -0.0025369244, 0.0903538382]

  # usb3 — USB 相机 #3 (Pi /dev/video2)
  - name: usb3
    type: usb
    host: pi
    device: "2"
    resolution: [2560, 1440]
    fps: 30
    camera_matrix:
      fx: 1884.7622269921
      fy: 1892.9056821886
      cx: 1250.0735116830
      cy: 800.3002597502
    dist_coeffs: [0.0767083150, -0.1106992434, 0.0010297454, 0.0003628016, 0.0231438061]

# ============================================================
# Tag 尺寸（单位：米）
# ============================================================
floor_tag_size: 0.09
target_tag_size: 0.134

# ============================================================
# 标定配置
# ============================================================
calibration:
  min_floor_tags: 8
  max_repro_error: 10.0

# ============================================================
# 检测 & 运行配置
# ============================================================
detector:
  families: "tag36h11"
  quad_decimate: 1.0

runtime:
  target_ids: [0, 1, 2, 3]
  reproj_error_threshold_px: 8.0
  consistency_sigma_m: 0.15
  target_fps: 20
  extrinsics_file: "cfg/extrinsics.yaml"
