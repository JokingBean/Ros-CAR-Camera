# ============================================================
# ROS-Camera 多相机立方体追踪 — 配置文件
# ============================================================

cameras:
  # --- PiCamera (2028x1520, 23张, err=0.185px) ---
  - name: picam_1
    type: picamera
    device: "picamera:0"
    resolution: [2028, 1520]
    fps: 50
    camera_matrix:
      fx: 1050.334926200355
      fy: 1048.6376210760568
      cx: 648.7089481788348
      cy: 555.0086514072527
    dist_coeffs: [0.13209451581213452, -0.5321770600946164, 0.011064387464706815, -0.0031891550951861193, 0.4985865573076669]

  # --- USB 相机1 (2048×1536, 2026-06-24 标定, 26张, err=0.133px) ---
  - name: usb_cam_1
    type: usb
    device: "0"
    resolution: [2048, 1536]
    fps: 30
    camera_matrix:
      fx: 1610.2607505637993
      fy: 1599.8428422217316
      cx: 962.8232993454835
      cy: 804.8184206234718
    dist_coeffs: [0.15041613386072877, -0.2511535043149947, 0.0028323369198573374, 0.00011846760683722663, 0.13376330362984476]

  # --- USB 相机2 (2560×1440, 2026-06-24 标定, 27张, err=0.163px) ---
  - name: usb_cam_2
    type: usb
    device: "1"
    resolution: [2560, 1440]
    fps: 30
    camera_matrix:
      fx: 1997.5587249126995
      fy: 2004.3731241586665
      cx: 1203.9179180060676
      cy: 784.2229843645761
    dist_coeffs: [0.08367392938135465, -0.1564921260177817, 0.0032120024917927253, -0.008345476729891107, 0.11271414400782927]

# ============================================================
# Tag 尺寸（单位：米）
# ============================================================
floor_tag_size: 0.09               # 地面 AprilTag 边长
target_tag_size: 0.135             # 目标（立方体）AprilTag 边长

# ============================================================
# 标定配置
# ============================================================
calibration:
  min_floor_tags: 6                # 最少地面 Tag 数
  max_repro_error: 10.0            # 重投影误差阈值（像素），超标重标定

# ============================================================
# 运行配置
# ============================================================
runtime:
  target_fps: 20
  extrinsics_file: "extrinsics.yaml"
